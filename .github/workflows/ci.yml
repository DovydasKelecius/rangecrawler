name: RangeCrawler CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js (for Prettier)
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        npm install -g prettier

    - name: Run Ruff Fix
      run: ruff check . --fix

    - name: Run Prettier
      run: prettier --write "**/*.{js,json,md,yml,yaml}"

    - name: Commit and Push changes
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "style: auto-fix linting and formatting (ruff + prettier)"
        branch: ${{ github.head_ref }}

    - name: Type Check with Mypy
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        mypy src/

    - name: Security Scan (Bandit)
      run: bandit -r src/

    - name: Run Unit Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: lint-and-fix
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: docker build -t rangecrawler-broker:latest .

    - name: Container Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'rangecrawler-broker:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

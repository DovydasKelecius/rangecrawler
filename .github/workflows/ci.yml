name: RangeCrawler CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with Ruff
      run: ruff check .

    - name: Type Check with Mypy
      run: mypy src/ --ignore-missing-imports

    - name: Security Scan (Bandit)
      run: bandit -r src/ -f json

    - name: Check Dependencies (Safety)
      run: safety check

    - name: Run Unit Tests
      run: |
        pip install pytest pytest-asyncio
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: lint-and-security
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      run: docker build -t rangecrawler-broker:latest -f tests/mock_env/Dockerfile .

    - name: Health Check inside Container
      run: |
        docker run -d --name test-broker -p 8005:8005 rangecrawler-broker:latest
        sleep 5
        curl -f http://localhost:8005/health
        docker stop test-broker

    - name: Container Security Scan (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'rangecrawler-broker:latest'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

  create-tag:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

  push-to-registry:
    runs-on: ubuntu-latest
    needs: create-tag
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: tests/mock_env/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rangecrawler:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rangecrawler:${{ github.sha }}

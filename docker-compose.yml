services:
  # The RangeCrawler Broker Agent
  broker:
    build:
      context: .
      dockerfile: tests/mock_env/Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./config.yaml:/app/config.yaml # Only mount the config
    environment:
      - PYTHONPATH=/app
      - GEMINI_API_KEY # Automatically pulls from your host shell environment
    command: python src/main.py --mode broker --config config.yaml

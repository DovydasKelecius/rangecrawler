services:
  # The RangeCrawler Broker (Registry)
  broker:
    build: .
    command: ["python", "-m", "src.main", "broker", "--host", "0.0.0.0", "--port", "8000"]
    profiles: ["broker", "all"]
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./src:/app/src
      - ./rangecrawler.db:/app/rangecrawler.db
    environment:
      - PYTHONPATH=/app
      - GEMINI_API_KEY

  # The Ollama Worker (Orchestrator)
  worker:
    build: .
    command: ["python", "-m", "src.main", "worker"]
    profiles: ["worker", "all"]
    network_mode: host
    volumes:
      - ./src:/app/src
      - ~/.ssh:/root/.ssh:ro
    environment:
      - PYTHONPATH=/app
      - BROKER_URL=${BROKER_URL:-http://localhost:8000}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}

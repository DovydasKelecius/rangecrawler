services:
  # The RangeCrawler Broker (Registry)
  broker:
    build: .
    command:
      [
        "python",
        "-m",
        "src.main",
        "broker",
        "--host",
        "0.0.0.0",
        "--port",
        "8005",
      ]
    profiles: ["broker", "all"]
    ports:
      - "8005:8005"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - RANGECRAWLER_CONFIG=config.yaml

  # The Ollama Worker (Orchestrator)
  worker:
    build: .
    command:
      ["python", "-m", "src.main", "worker", "--broker-url", "${BROKER_URL}"]
    profiles: ["worker", "all"]
    network_mode: host
    volumes:
      - ./src:/app/src
      - ~/.ssh:/root/.ssh:ro
    environment:
      - PYTHONPATH=/app
      - BROKER_URL=${BROKER_URL:-http://localhost:8005}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}

# RangeCrawler Default Configuration
# This file defines the default shape and values for the application.
# Environment-specific overrides and secrets should be placed in a .env file.

broker:
  host: "0.0.0.0" # Listen on all interfaces by default
  default_port: 8005 # Default port, can be overridden by BROKER_PORT in .env
  database_path: "rangecrawler.db"

# Agent behavior settings
agent:
  enabled: true
  max_iterations: 15
  default_timeout: 120
  working_directory: "./agent_workspace"

logging:
  level: "INFO" # Default logging level

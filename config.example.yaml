# RangeCrawler Configuration Template
# Copy this to config.yaml and fill in your details

broker:
  # The interface the broker binds to. Use "0.0.0.0" to accept remote connections.
  host: "0.0.0.0"
  
  # Optional: URL to fetch an assigned port (useful for dynamic orchestration)
  port_assignment_url: null 
  
  # The default port the broker listens on
  default_port: 8000
  
  # Timeout in seconds before a session is considered idle
  idle_timeout: 300
  
  # How often (seconds) the broker checks for idle sessions
  check_interval: 60
  
  # PROFESSIONAL SETUP: Store the database in a dedicated data directory.
  # This directory should be mounted as a volume in Docker for persistence.
  database_path: "data/rangecrawler.db"

# Agent & Orchestration settings
agent:
  # Global toggle for agent capabilities
  enabled: true
  
  # Maximum number of tool-calling iterations for a single prompt
  max_iterations: 15
  
  # Default timeout for tool execution (seconds)
  default_timeout: 30
  
  # Where local agent operations (read/write) are performed
  working_directory: "./agent_workspace"
  
  # PRE-REGISTERED WORKSPACES (Optional)
  # You can define known clients here instead of relying on self-registration.
  workspaces:
    - client_ip: "192.168.1.50" # Example: A static VM in your network
      ssh_host: "192.168.1.50"
      ssh_port: 22
      ssh_username: "root"
      ssh_pkey_path: "/root/.ssh/id_rsa"
      working_directory: "/"

# AI MODEL ROUTING
# Map OpenAI-style model IDs to specific provider endpoints.
models:
  # Example: Using a local Ollama instance
  - id: "llama3"
    remote_url: "http://localhost:11434/api/"

logging:
  # Logging levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
